<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        .input-box.button {
            width: 100%;
            text-align: center;
        }
    
        /* Continue Button */
        .input-box.button input[type="button"] {
            color: #c2f4f5;
            background: linear-gradient(90deg, #00FF00, #000000); /* Green to Black gradient */
            font-size: 15px;
            border: 1px solid #2d63c8;
            width: 100%;
            height: 40px;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s; /* Add a smooth transition for the transform property */
        }
    
        .input-box.button input[type="button"]:hover {
            color: #2d63c8;
            background: #ffffff; /* Change the hover background color to white */
        }
    
        .input-box.button input[type="button"]:active {
            transform: scale(0.95); /* Apply a scale transformation on button click */
        }
    
        /* Create Account Button */
        .container button {
            color: #c2f4f5;
            background-color: #7712eb;
            font-size: 15px;
            border: 1px solid #2d63c8;
            width: 100%;
            height: 40px;
            border-radius: 5px;
            cursor: pointer;
        }
    
        .container button:hover {
            color: #2d63c8;
            background-color: #ffffff;
        }
        
        .powered-by-footer {
            position: absolute; /* Sticks it at the bottom */
            bottom: 10px; /* Adjust this as needed */
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 14px;
            color: #777;
            font-weight: bold;
            width: 100%;
        }

        .suntrenia {
            color: #777;/* Suntrenia brand color */
        }

        .container {
            position: relative;
        }
  
        .container img {
            position: absolute;
            top: 50px; /* Adjust this value to move the logo down */
            left: 50%; /* Adjust this value to horizontally center the logo */
            transform: translateX(-50%);
        }

        /* Success Animation Styles - Made smaller */
        .success-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }
      
        .success-animation.show {
            opacity: 1;
            visibility: visible;
        }
      
        .success-content {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 220px;
            width: 70%;
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
      
        .success-animation.show .success-content {
            transform: scale(1);
        }
      
        .success-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            position: relative;
        }
      
        .success-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #4CAF50;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 1.5s infinite;
        }
      
        .checkmark {
            width: 30px;
            height: 15px;
            border-left: 3px solid white;
            border-bottom: 3px solid white;
            transform: rotate(-45deg);
            margin-top: -3px;
        }
      
        .success-text {
            font-size: 20px;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 8px;
        }
      
        .user-name {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }
      
        .redirect-text {
            font-size: 12px;
            color: #777;
        }
      
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            }
            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(76, 175, 80, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0);
            }
        }

    </style>
</head>
<body>
    <div>
      <main>
        <!-- Intellijob logo: tie + wordmark, scaled and lowered -->
        <svg xmlns="http://www.w3.org/2000/svg"
             width="300" height="90"
             viewBox="0 0 300 90"
             preserveAspectRatio="xMinYMid meet"
             role="img"
             aria-labelledby="logoTitle logoDesc"
             style="display:block; margin: 0 0 30px 0;"  <!-- pushes it further down toward the login box -->
             focusable="false">
          <title id="logoTitle">Intellijob logo — tie with brand text</title>
          <desc id="logoDesc">A stylized dark blue tie icon next to the word Intellijob, clean, bold and left-aligned.</desc>
      
          <style>
            .tie { fill: #0D47A1; }   /* dark blue tie */
            .text { 
              font-family: 'Calibri', 'Segoe UI', sans-serif;
              font-size: 36px;
              font-weight: bold;
              fill: #FFFFFF;          /* white text */
            }
          </style>
      
          <!-- Tie icon (enlarged and lowered slightly) -->
          <g transform="translate(0,10) scale(1.3)">
            <!-- knot -->
            <path class="tie" d="M10 0 L30 0 L25 10 L15 10 Z" />
            <!-- blade -->
            <path class="tie" d="M15 10 L25 10 L33 40 C34 42 32.5 44 31 44 L24 52 L16 52 L9 44 C7.5 44 6 42 7 40 L15 10 Z" />
          </g>
      
          <!-- Brand name (shifted close to tie) -->
          <text x="70" y="58" class="text">Intellijob</text>
        </svg>
      </main>
      
      
      
      
      
    </div>

    <div class="container" style="position: relative; top: -50px;">
        <form id="loginForm">
            <div class="title">Login</div>
            <div class="input-box underline">
                <input type="text" id="phoneNumber" placeholder="Enter Your Phone Number" required>
                <div class="underline"></div>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Enter Your Password" required>
                <div class="underline"></div>
            </div>
            <div class="input-box button">
                <input type="button" value="Continue" onclick="loginFunction()">
            </div>
        </form>

        <div>
            <button type="submit" id="travels_advisory" onclick="gotoregister_myFunction()">Create Account</button>
        </div>

        <footer class="powered-by-footer">
            <p>Powered by <span class="suntrenia">Suntrenia</span></p>
        </footer>
    </div>
  
    <!-- Success Animation Overlay -->
    <div class="success-animation" id="successAnimation">
        <div class="success-content">
            <div class="success-icon">
                <div class="success-circle">
                    <div class="checkmark"></div>
                </div>
            </div>
            <div class="success-text">Welcome!</div>
            <div class="user-name" id="welcomeUserName"></div>
            <div class="redirect-text">Redirecting to dashboard...</div>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        fetch('/check-auth')
            .then(response => response.json())
            .then(data => {
                if (data.authenticated) {
                    window.location.href = '/protected/intellijob_dashboard.html';
                }
            });
    </script>
    
    <script>
        function gotoregister_myFunction() {
            // Redirect to the create_account.html page or perform any other actions
            window.location.href = "create_account.html";
        }
    </script>

    <script>
        // Function to clean and format the phone number
        function cleanAndFormatPhoneNumber(phoneNumber) {
            if (typeof phoneNumber !== 'string') {
                console.error('Invalid phoneNumber:', phoneNumber);
                return phoneNumber;
            }

            // Remove non-digit characters and add country code if missing
            const cleanedNumber = phoneNumber.replace(/\D/g, '');

            // Check if the number starts with '0' and replace it with '+234'
            if (cleanedNumber.startsWith('0')) {
                const formattedNumber = `+234${cleanedNumber.slice(1)}`;
                return formattedNumber;
            }

            // Check if the number starts with '234' and add '+' if missing
            if (cleanedNumber.startsWith('234')) {
                return `+${cleanedNumber}`;
            }

            // If the number doesn't start with '0' or '234', add '+234' as the prefix
            return `+234${cleanedNumber}`;
        }

        // Function to extract first name from full name
        function getFirstName(fullName) {
            if (!fullName) return '';
            return fullName.split(' ')[0];
        }

        // Function to show success animation
        function showSuccessAnimation(userName, redirectUrl) {
            const animation = document.getElementById('successAnimation');
            const welcomeText = document.getElementById('welcomeUserName');
            
            // Set only the first name if available
            if (userName) {
                welcomeText.textContent = getFirstName(userName);
            } else {
                welcomeText.style.display = 'none';
            }
            
            // Show the animation
            animation.classList.add('show');
            
            // Redirect after 2 seconds - directly to dashboard
            setTimeout(() => {
                // Clear any form data
                document.getElementById('loginForm').reset();
                // Redirect directly to dashboard
                window.location.href = redirectUrl || '/protected/intellijob_dashboard.html';
            }, 2000);
        }
        
        function loginFunction() {
            const phoneNumber = cleanAndFormatPhoneNumber(document.getElementById("phoneNumber").value);
            const password = document.getElementById("password").value;

            // Send login credentials to the server
            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ phoneNumber, password }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.token) {
                    // Store the token in localStorage or a secure storage method
                    localStorage.setItem('token', data.token);

                    // Store user's name in localStorage
                    localStorage.setItem('userName', data.userName);

                    // Show beautiful success animation instead of alert
                    showSuccessAnimation(data.userName, data.redirect);
                } else {
                    // Display an alert if the message is about creating an account
                    if (data.message && data.message.includes('create an account')) {
                        alert(data.message);
                    } else {
                        // Handle other error messages (e.g., invalid credentials)
                        console.error('Error during login:', data.message);
                        alert('Login failed. Please check your credential or activate your account...');
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                // Handle errors
            });
        }
    </script>
</body>
</html>
