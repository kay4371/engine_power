        .container {

      /* Success Animation Styles */
      .success-animation {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease;
      }
      
      .success-animation.show {
        opacity: 1;
        visibility: visible;
      }
      
      .success-content {
        background-color: white;
        border-radius: 16px;
        padding: 30px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        max-width: 300px;
        width: 80%;
        transform: scale(0.8);
        transition: transform 0.3s ease;
      }
      
      .success-animation.show .success-content {
        transform: scale(1);
      }
      
      .success-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        position: relative;
      }
      
      .success-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background-color: #4CAF50;
        display: flex;
        justify-content: center;
        align-items: center;
        animation: pulse 1.5s infinite;
      }
      
      .checkmark {
        width: 40px;
        height: 20px;
        border-left: 4px solid white;
        border-bottom: 4px solid white;
        transform: rotate(-45deg);
        margin-top: -5px;
      }
      
      .success-text {
        font-size: 24px;
        font-weight: bold;
        color: #4CAF50;
        margin-bottom: 10px;
      }
      
      .user-name {
        font-size: 18px;
        color: #333;
        margin-bottom: 10px;
      }
      
      .redirect-text {
        font-size: 14px;
        color: #777;
      }
      
      @keyframes pulse {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
        }
        70% {
          transform: scale(1.05);
          box-shadow: 0 0 0 10px rgba(76, 175, 80, 0);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(76, 175, 80, 0);
        }
      }

  <script>
    // Function to clean and format the phone number
   // Function to clean and format the phone number
function cleanAndFormatPhoneNumber(phoneNumber) {
  if (typeof phoneNumber !== 'string') {
    console.error('Invalid phoneNumber:', phoneNumber);
    return phoneNumber;
  }

  // Remove non-digit characters and add country code if missing
  const cleanedNumber = phoneNumber.replace(/\D/g, '');

  // Check if the number starts with '0' and replace it with '+234'
  if (cleanedNumber.startsWith('0')) {
    const formattedNumber = `+234${cleanedNumber.slice(1)}`;
    return formattedNumber;
  }

  // Check if the number starts with '234' and add '+' if missing
  if (cleanedNumber.startsWith('234')) {
    return `+${cleanedNumber}`;
  }

  // If the number doesn't start with '0' or '234', add '+234' as the prefix
  return `+234${cleanedNumber}`;
}

// Function to show success animation
function showSuccessAnimation(userName) {
  const animation = document.getElementById('successAnimation');
  const welcomeText = document.getElementById('welcomeUserName');
  
  // Set the user's name if available
  if (userName) {
    welcomeText.textContent = userName;
  } else {
    welcomeText.style.display = 'none';
  }
  
  // Show the animation
  animation.classList.add('show');
  
  // Redirect after 2 seconds (you can adjust this timing)
  setTimeout(() => {
    window.location.href = data.redirect;
  }, 2000);
}
 
  function loginFunction() {
  const phoneNumber = cleanAndFormatPhoneNumber(document.getElementById("phoneNumber").value);
  const password = document.getElementById("password").value;

  // Send login credentials to the server
  fetch('/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ phoneNumber, password }),
  })
  .then(response => response.json())
  .then(data => {
    if (data.token) {
      // Store the token in localStorage or a secure storage method
      localStorage.setItem('token', data.token);

      // Store user's name in localStorage
      localStorage.setItem('userName', data.userName);

      // Show beautiful success animation instead of alert
      showSuccessAnimation(data.userName);
    } else {
      // Display an alert if the message is about creating an account
      if (data.message && data.message.includes('create an account')) {
        alert(data.message);
      } else {
        // Handle other error messages (e.g., invalid credentials)
        console.error('Error during login:', data.message);
        alert('Login failed. Please check your credential or activate your account...');
      }
    }
  })
  .catch(error => {
    console.error('Error:', error);
    // Handle errors
  });
}
</script>
