    <script>

        function getVerificationCode() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    let phoneNumber = document.getElementById("phoneNumber").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    phoneNumber = cleanedPhoneNumber(phoneNumber);

    if (!isValidPhoneNumberFormat(phoneNumber)) {
        alert('Invalid phone number format. Please enter a valid number in the format 07034995589.');
        return;
    }

    const requestData = {
        name,
        email,
        password,
        confirmPassword,
        phoneNumber,
    };

    fetch('/generateVerificationCode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestData),
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {  // Check for success flag instead of message

        } else {
            // If not successful, show error message
            alert(data.message || 'Registration failed');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('An error occurred during registration');
    });
}

                    function registerNow() {
                const name = document.getElementById("name").value;
                const email = document.getElementById("email").value;
                let phoneNumber = document.getElementById("phoneNumber").value;
                const password = document.getElementById("password").value;
                const confirmPassword = document.getElementById("confirmPassword").value;

                // Clean and validate phone number
                phoneNumber = cleanedPhoneNumber(phoneNumber);
                if (!isValidPhoneNumberFormat(phoneNumber)) {
                    alert('Invalid phone number format. Please enter a valid number in the format 07034567436.');
                    return;
                }


                /////////////////////////////////////////////////////////////////////////
                fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phoneNumber, password, confirmPassword }),
                    })
                    .then(response => {
                        // Check content type and parse accordingly
                        const contentType = response.headers.get('content-type');
                        if (contentType && contentType.includes('application/json')) {
                        return response.json();
                        } else {
                        return response.text().then(text => { throw new Error(text); });
                        }
                    })
                    .then(data => {
                        if (data.success) {
                            try {
                                // Check if localStorage is available
                                if (typeof(Storage) !== "undefined") {
                                    localStorage.setItem('registrationEmail', email);
                                } else {
                                    console.warn("Local storage is not supported in this browser");
                                }
                                
                                window.location.href = "activate_account.html";
                            } catch (storageError) {
                                console.error('Error storing email in localStorage:', storageError);
                                // Fallback mechanism if localStorage fails
                                alert('Could not store email, please proceed to activation page');
                                window.location.href = "activate_account.html";
                            }
                        } else {
                            alert(data.message);
                        }
                    })
                    .catch(error => {
                        console.error('Registration failed:', error);
                        alert('An error occurred during registration.');
                    });
            }

            function cleanedPhoneNumber(phoneNumber) {
                const cleanedNumber = phoneNumber.replace(/\D/g, '');
                return cleanedNumber.startsWith('0') ? `+234${cleanedNumber.slice(1)}` : `+234${cleanedNumber}`;
            }

            function isValidPhoneNumberFormat(phoneNumber) {
                const phoneNumberRegex = /^\+234\d{10}$/;
                return phoneNumberRegex.test(phoneNumber);
            }

      </script>
      </body>
